name: NOTOM - CI

on:
  push:
    branches: [ "main" ]

jobs:
  inspection-generale:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Préparer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Linting
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Build Docker
        run: |
          docker build -t notom-app-test .